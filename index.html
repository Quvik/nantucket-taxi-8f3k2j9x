let currentZoneName = null;
let zonesGeoJSON = null;

const map = L.map('map').setView([41.2835, -70.0995], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

fetch('zones.kml')
.then(res => res.text())
.then(kmlText => {

    const parser = new DOMParser();
    const kml = parser.parseFromString(kmlText, 'text/xml');

    zonesGeoJSON = toGeoJSON.kml(kml);

    try {
        const layer = L.geoJSON(zonesGeoJSON, {
            style: { color: '#00bfff', weight: 2, fillOpacity: 0.2 }
        }).addTo(map);
        map.fitBounds(layer.getBounds());
    } catch(e) {}

    detectCurrentLocation();
});

function detectCurrentLocation() {

    navigator.geolocation.getCurrentPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const point = turf.point([lng, lat]);

        L.marker([lat, lng]).addTo(map);

        const detected = findZone(point) === 'Cross Town' ? 'Town' : findZone(point);
        gpsZoneName = detected;

        // Only apply if user hasn't overridden manually
        if(!zoneIsManual){
            currentZoneName = detected;
            document.getElementById('currentZone').innerText = currentZoneName || 'Unknown';
        }

    }, err => {
        alert('Allow location access');
    });
}

function findZone(point) {

    let fallbackZone = null;

    for (const feature of zonesGeoJSON.features) {

        try {

            if (turf.booleanPointInPolygon(point, feature)) {

                const zoneName =
                    feature.properties.name || "Unknown";

                // Ignore Cross Town overlay zone
                if (zoneName === 'Cross Town') {
                    fallbackZone = 'Town';
                    continue;
                }

                return zoneName;
            }

        } catch(e) {}
    }

    return fallbackZone;
}

function getFare(fromZone, toZone) {

    const direct = `${fromZone}-${toZone}`;
    const reverse = `${toZone}-${fromZone}`;

    return fareTable[direct] || fareTable[reverse] || null;
}

let lastFerryRefresh = 0;
const FERRY_REFRESH_INTERVAL = 5 * 60 * 1000; // 5 минут

function showTab(tabId, btn){
  document.getElementById('taxiTab').style.display='none';
  document.getElementById('ferryTab').style.display='none';
  document.getElementById(tabId).style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active-tab'));
  btn.classList.add('active-tab');
  if(tabId==='ferryTab'){
    renderFerryTab();
    startFerryTick();
    // Auto-refresh live data if not refreshed in last 5 minutes
    if(Date.now() - lastFerryRefresh > FERRY_REFRESH_INTERVAL){
      lastFerryRefresh = Date.now();
      refreshFerryLive();
    }
  } else { stopFerryTick(); }
}

function ferryTargetDate(off){ const d=new Date(); d.setDate(d.getDate()+(off||0)); return d; }
function dateKey(d){ return d.toISOString().slice(0,10); }
function ferryLabel(d){
  const diff=Math.round((new Date(dateKey(d))-new Date(dateKey(new Date())))/86400000);
  if(diff===0) return 'Сегодня'; if(diff===1) return 'Завтра'; if(diff===-1) return 'Вчера';
  return d.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'});
}
function parseFT(t,base){
  const[ts,mod]=t.trim().split(' '); let[h,m]=ts.split(':').map(Number);
  if(mod==='PM'&&h!==12)h+=12; if(mod==='AM'&&h===12)h=0;
  const d=new Date(base); d.setHours(h,m,0,0); return d;
}
function fmtCD(ms){
  if(ms<=0)return'Прибыл'; const m=Math.floor(ms/60000),h=Math.floor(m/60);
  return h>0?`${h}ч ${m%60}м`:`${m} мин`;
}
function lineEmoji(l){return l.includes('Steam')?'🚢':l.includes('Hy')?'🚤':l.includes('Sea')?'⛴':l.includes('Free')?'🛥':'⛵';}
function lineColor(l){return l.includes('Steam')?'#0A84FF':l.includes('Hy')?'#30d158':l.includes('Sea')?'#ff9f0a':l.includes('Free')?'#bf5af2':'#aaa';}

function builtinArrivals(targetDate){
  const key=dateKey(targetDate);
  const season=FERRY_BUILTIN.find(s=>key>=s.from&&key<=s.to);
  if(!season)return null;
  const dow=targetDate.getDay();
  return season.arrivals
    .filter(a=>!a.days||a.days.includes(dow))
    .map(a=>({...a,dateObj:parseFT(a.time,targetDate),source:'builtin'}))
    .sort((a,b)=>a.dateObj-b.dateObj);
}

const PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
async function scrapeLive(){
  let html=null;
  for(const mk of PROXIES){
    try{ const r=await fetch(mk('https://www.nantucketferries.com'),{signal:AbortSignal.timeout(8000)});
      if(r.ok){html=await r.text();break;} }catch(e){}
  }
  if(!html)return null;
  const clean=html.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/gi,' ');
  const arrivals=[];
  function extractArr(block,fromPort,ferryType){
    if(!block)return;
    const rx=/(\d{1,2}:\d{2}\s*[ap]\.m\.)\s*[-–]\s*(\d{1,2}:\d{2}\s*[ap]\.m\.)\s*\(([^)]+)\)/gi;
    let m;
    while((m=rx.exec(block[0]))!==null){
      const raw=m[2].replace(/\./g,'').trim();
      const t=raw.replace(/\s*am$/i,'AM').replace(/\s*pm$/i,'PM').replace(/\s+/g,' ').trim();
      arrivals.push({time:t,line:m[3].trim(),from:fromPort,type:ferryType,source:'live'});
    }
  }
  extractArr(clean.match(/Hyannis to Nantucket[\s\S]{0,4000}?(?=Nantucket to Hyannis)/i),'Hyannis','High-Speed');
  extractArr(clean.match(/New Bedford to Nantucket[\s\S]{0,2000}?(?=Nantucket to New|FROM)/i),'New Bedford','High-Speed');
  extractArr(clean.match(/Harwich[\s\S]{0,1000}?(?=Nantucket to Harwich|FROM)/i),'Harwich Port','Fast Ferry');
  return arrivals.length>0?arrivals:null;
}

// Returns true if a line name belongs to Hy-Line (any variant)
function isHyLineFerry(name){ return /hy[\s-]?line/i.test(name); }

async function scrapeHyLine(){
  let html=null;
  for(const mk of PROXIES){
    try{
      const r=await fetch(mk('https://www.hylinecruises.com/schedules/'),{signal:AbortSignal.timeout(9000)});
      if(r.ok){html=await r.text();break;}
    }catch(e){}
  }
  if(!html)return null;
  const text=html.replace(/<[^>]+>/g,' ').replace(/&[a-z#\d]+;/gi,' ').replace(/\s+/g,' ');
  // Find the Hyannis → Nantucket direction block (stop before the return direction)
  const block=text.match(/Hyannis.{0,80}Nantucket[\s\S]{0,8000}?(?=Nantucket.{0,80}Hyannis|$)/i)?.[0];
  if(!block)return null;
  // Extract times like "7:10 AM", "7:10am", "7:10AM"
  const times=[...block.matchAll(/\b(\d{1,2}:\d{2})\s*(AM|PM|am|pm)\b/g)]
    .map(m=>`${m[1]} ${m[2].toUpperCase()}`);
  const unique=[...new Set(times)];
  return unique.length?unique.map(t=>({time:t,line:'Hy-Line',from:'Hyannis',type:'High-Speed',source:'hyline'})):null;
}

async function refreshFerryLive(){
  lastFerryRefresh = Date.now();
  const btn=document.getElementById('refreshFerryBtn');
  const icon=document.getElementById('refreshIcon');
  const lbl=document.getElementById('refreshLabel');
  icon.innerText='⏳'; lbl.innerText='Подключаюсь...'; btn.disabled=true;
  try{
    const td=ferryTargetDate(ferryDayOffset);
    // Fetch both sources in parallel
    const [hyRaw, allRaw] = await Promise.allSettled([scrapeHyLine(), scrapeLive()]);
    const hy  = hyRaw.status==='fulfilled'  && hyRaw.value?.length  ? hyRaw.value  : null;
    const all = allRaw.status==='fulfilled' && allRaw.value?.length ? allRaw.value : null;

    // Non-Hy-Line ferries (Steamship, Seastreak, Freedom) always from nantucketferries.com
    const nonHy = all ? all.filter(a=>!isHyLineFerry(a.line)) : [];
    // Hy-Line: prefer hylinecruises.com, fall back to nantucketferries.com if unavailable
    const hyLine = hy ? hy : (all ? all.filter(a=>isHyLineFerry(a.line)) : []);
    const merged = [...nonHy, ...hyLine];

    if(merged.length>0){
      const now=new Date();
      const parsed=merged.map(a=>({...a,dateObj:parseFT(a.time,td)})).sort((a,b)=>a.dateObj-b.dateObj);
      const upcoming=parsed.filter(a=>a.dateObj>now);
      const hySource = hy ? 'hylinecruises.com' : (all ? 'nantucketferries.com' : '—');
      if(upcoming.length>0){
        // Live has upcoming ferries — use live data fully
        ferryLiveCache[dateKey(td)]=parsed;
        renderFerryTab('live');
        icon.innerText='✅';
        lbl.innerText=`Live · Hy-Line: ${hySource}`;
      } else {
        // Live only has past ferries — combine with built-in future so display stays correct
        const builtinFuture=(builtinArrivals(td)||[]).filter(a=>a.dateObj>now);
        const hybrid=[...parsed,...builtinFuture].sort((a,b)=>a.dateObj-b.dateObj);
        ferryLiveCache[dateKey(td)]=hybrid;
        renderFerryTab('live');
        icon.innerText='📋';
        lbl.innerText=`Live прошедшие · расписание встроенное`;
      }
    } else { icon.innerText='📋'; lbl.innerText='Нет live данных'; }
  }catch(e){ icon.innerText='⚠️'; lbl.innerText='Нет связи'; }
  btn.disabled=false;
  setTimeout(()=>{ icon.innerText='🔄'; lbl.innerText='Live-обновление'; },4000);
}

function renderRushCard(upcoming,now){
  const card=document.getElementById('rushIndicatorCard');
  if(!upcoming||!upcoming.length){ card.innerHTML=`<div style="opacity:.5;font-size:13px;">Статус</div><div style="font-size:20px;font-weight:800;margin-top:4px;">🌙 Больше паромов нет</div>`; return; }
  const next=upcoming[0],mins=Math.floor((next.dateObj-now)/60000);
  let icon,color,msg,sub;
  if(mins<=20){icon='🚨';color='#ff453a';msg=`Паром через ${mins} мин!`;sub=`${lineEmoji(next.line)} ${next.line} · ${next.time} из ${next.from}`;}
  else if(mins<=45){icon='⚠️';color='#ffd60a';msg=`Паром через ${Math.floor(mins/60)?Math.floor(mins/60)+'ч ':''}${mins%60}мин`;sub=`${lineEmoji(next.line)} ${next.line} · ${next.time}`;}
  else{icon='🟢';color='#30d158';const h=Math.floor(mins/60),m=mins%60;msg=`Спокойно · ${h?h+'ч ':''}${m}м`;sub=`${lineEmoji(next.line)} ${next.line} прибудет в ${next.time}`;}
  card.innerHTML=`<div style="opacity:.5;font-size:13px;">Статус</div><div style="font-size:22px;font-weight:900;color:${color};margin-top:4px;">${icon} ${msg}</div><div style="font-size:13px;opacity:.7;margin-top:5px;">${sub}</div>`;
}

// ── Ferry Notifications ─────────────────────────────────────
let ferryNotifyEnabled = false;
let ferryNotifyTickId = null;
const NOTIFY_THRESHOLDS = [30, 15]; // минуты
let notifiedFerries = new Set();

async function toggleFerryNotifications(){
    const btn = document.getElementById('notifyBtn');
    const status = document.getElementById('notifyStatus');

    if(ferryNotifyEnabled){
        ferryNotifyEnabled = false;
        clearInterval(ferryNotifyTickId);
        ferryNotifyTickId = null;
        notifiedFerries.clear();
        btn.innerHTML = '🔔 Enable Ferry Alerts';
        btn.style.borderColor = '#2a2a2a';
        status.textContent = '';
        return;
    }

    if(!('Notification' in window)){
        status.textContent = 'Notifications not supported in this browser';
        return;
    }

    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){
        status.textContent = 'Permission denied — enable in browser settings';
        return;
    }

    ferryNotifyEnabled = true;
    btn.innerHTML = '🔕 Disable Ferry Alerts';
    btn.style.borderColor = '#0A84FF';
    status.textContent = 'Alerts on: 30 min & 15 min before each ferry';
    checkFerryNotifications();
    ferryNotifyTickId = setInterval(checkFerryNotifications, 60000);
}

function checkFerryNotifications(){
    if(!ferryNotifyEnabled) return;
    const td = ferryTargetDate(0);
    const arrivals = ferryLiveCache[dateKey(td)] || builtinArrivals(td) || [];
    const now = new Date();

    arrivals.forEach(a => {
        const mins = Math.floor((a.dateObj - now) / 60000);
        NOTIFY_THRESHOLDS.forEach(threshold => {
            const key = `${a.dateObj.toISOString()}-${threshold}`;
            if(mins <= threshold && mins > threshold - 2 && !notifiedFerries.has(key)){
                notifiedFerries.add(key);
                new Notification(`${lineEmoji(a.line)} Ferry in ${threshold} min`, {
                    body: `${a.line} from ${a.from} arrives at ${a.time}`,
                    icon: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
                    tag: key
                });
            }
        });
    });
}

};

    }

    const url =
        `https://waze.com/ul?q=${encodeURIComponent(lastDestinationAddress)}&navigate=yes`;

    window.open(url, '_blank');
}



// AUTOCOMPLETE — handled by initAutocomplete() below

const chipState = { nightFee: false, dirtRoad: false };

function toggleChip(btn, id) {
    chipState[id] = !chipState[id];
    btn.classList.toggle('on', chipState[id]);
    try { calculateFare(); } catch(e) {}
}

async function calculateFare() {

    const address = document.getElementById('destination').value.trim();

    if (!address) {
        alert('Enter destination');
        return;
    }

    lastDestinationAddress = address;

    const passengers =
        parseInt(document.getElementById('passengers').value);

    const extraPassengers =
        Math.max(0, passengers - 1);

    const passengerCharge =
        extraPassengers * 3;

    const dogs =
        parseInt(document.getElementById('dogs').value);

    const dogCharge = dogs * 5;

    const bikes =
        parseInt(document.getElementById('bikes').value);

    const bikeCharge = bikes * 5;

    const bags =
        parseInt(document.getElementById('bags').value);

    const bagCharge = bags * 2;

    const nightCharge = chipState.nightFee ? 5 : 0;
    const dirtCharge  = chipState.dirtRoad  ? 5 : 0;

    let destinationZone = null;
    let lat = null;
    let lng = null;

    // LOCAL DATABASE FIRST
    const localMatch = localPlaces.find(p =>
        p.name.toLowerCase() === address.toLowerCase() ||
        address.toLowerCase().includes(p.name.toLowerCase())
    );

    if (localMatch) {

        destinationZone = localMatch.zone;

    } else if (
        window.selectedPlace &&
        window.selectedPlace.geometry
    ) {

        lat =
            window.selectedPlace.geometry.location.lat();

        lng =
            window.selectedPlace.geometry.location.lng();

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);

    } else {

        const url =
            `https://photon.komoot.io/api/?q=${encodeURIComponent(address + " Nantucket")}&limit=5`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.features || !data.features.length) {
            alert('Place not found');
            return;
        }

        const best = data.features[0];

        lat = best.geometry.coordinates[1];
        lng = best.geometry.coordinates[0];

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);
    }

    if (destinationZone === 'Cross Town') {
        destinationZone = 'Town';
    }

    document.getElementById('destinationZone').innerText =
        destinationZone || 'Unknown';

    if (!currentZoneName || !destinationZone) {
        document.getElementById('fare').innerText = '$ ?';
        return;
    }

    let baseFare = getFare(currentZoneName, destinationZone);

    if (
        currentZoneName === 'Town' &&
        destinationZone === 'Town'
    ) {
        baseFare = 14;
    }

    if (!baseFare) {
        document.getElementById('fare').innerText =
            'No fare found';
        return;
    }

    const totalFare =
        baseFare +
        passengerCharge +
        dogCharge +
        bikeCharge +
        bagCharge +
        nightCharge +
        dirtCharge;

    document.getElementById('fare').innerText =
        `$${totalFare}`;

    const extras = [
        ['Passengers +' + extraPassengers, passengerCharge],
        ['Dogs ×' + dogs, dogCharge],
        ['Bikes ×' + bikes, bikeCharge],
        ['Bags ×' + bags, bagCharge],
        ['Night', nightCharge],
        ['Dirt Road', dirtCharge],
    ].filter(([,v]) => v > 0);

    const extraRows = extras.map(([label, val]) =>
        `<div class="fare-row"><span>${label}</span><span>+$${val}</span></div>`
    ).join('');

    document.getElementById('fareBreakdown').innerHTML =
`<div class="fare-row" style="margin-top:8px;"><span>Base (${currentZoneName} → ${destinationZone})</span><span>$${baseFare}</span></div>
${extraRows}
<div class="total-row"><span>Total</span><span>$${totalFare}</span></div>`;

    if (lat && lng) {

        L.marker([lat, lng]).addTo(map);

        map.setView([lat, lng], 14);
    }
}

</script>



<script>
// ── Nantucket bbox ──────────────────────────────────────────
const NAN_BOUNDS = { minLat:41.230, maxLat:41.340, minLng:-70.240, maxLng:-69.950 };
function isOnNantucket(lat,lng){
  return lat>=NAN_BOUNDS.minLat&&lat<=NAN_BOUNDS.maxLat&&lng>=NAN_BOUNDS.minLng&&lng<=NAN_BOUNDS.maxLng;
}

let acService, placesService, sessionToken, acDropdown, acDebounceTimer;

function initAutocomplete(){
  const input = document.getElementById('destination');

  acService     = new google.maps.places.AutocompleteService();
  placesService = new google.maps.places.PlacesService(document.createElement('div'));
  sessionToken  = new google.maps.places.AutocompleteSessionToken();

  // Build custom dark dropdown — attached to body so it overlays everything
  acDropdown = document.createElement('div');
  acDropdown.id = 'ac-dropdown';
  acDropdown.style.cssText = `
    position:fixed;z-index:99999;
    background:#1c1c1e;border:1px solid #333;border-radius:14px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:220px;display:none;
    box-shadow:0 8px 32px rgba(0,0,0,.85);
  `;
  document.body.appendChild(acDropdown);

  // Input → debounced search
  input.addEventListener('input', ()=>{
    window.selectedPlace = null;
    clearTimeout(acDebounceTimer);
    const raw = input.value.trim();
    // Reset fare display when cleared
    if(!raw){
      hideDropdown();
      try{
        document.getElementById('destinationZone').innerText='-';
        document.getElementById('fare').innerText='$ -';
        document.getElementById('fareBreakdown').innerHTML='';
      }catch(e){}
      return;
    }
    if(raw.length < 2){ hideDropdown(); return; }
    acDebounceTimer = setTimeout(()=>fetchSuggestions(raw), 320);
  });

  // Close on outside tap/click
  document.addEventListener('click', e=>{
    if(!input.contains(e.target)&&!acDropdown.contains(e.target)) hideDropdown();
  });

  // Prevent Enter from reloading page on mobile
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') e.preventDefault(); });
}

function fetchSuggestions(query){
  const nanBounds = new google.maps.LatLngBounds(
    new google.maps.LatLng(41.230, -70.240),
    new google.maps.LatLng(41.340, -69.950)
  );
  acService.getPlacePredictions({
    input: query,
    sessionToken: sessionToken,
    bounds: nanBounds,
    strictBounds: true,
    componentRestrictions: { country:'us' },
    types: ['geocode','establishment']
  }, (predictions, status)=>{
    if(status !== google.maps.places.PlacesServiceStatus.OK || !predictions){ hideDropdown(); return; }
    // Filter by secondary_text to ensure results are in Nantucket (not just streets named "Nantucket")
    const nan = predictions.filter(p =>
      (p.structured_formatting?.secondary_text||'').toLowerCase().includes('nantucket')
    );
    renderDropdown((nan.length ? nan : predictions).slice(0,5));
  });
}

function renderDropdown(predictions){
  acDropdown.innerHTML='';
  if(!predictions.length){ hideDropdown(); return; }
  predictions.forEach((pred,i)=>{
    const item = document.createElement('div');
    item.style.cssText=`padding:13px 16px;cursor:pointer;font-size:15px;color:white;
      ${i<predictions.length-1?'border-bottom:1px solid #2a2a2a;':''}
      display:flex;align-items:center;gap:10px;`;
    const main = pred.structured_formatting?.main_text || pred.description;
    const sec  = (pred.structured_formatting?.secondary_text||'')
      .replace(/,?\s*Nantucket,?\s*MA\s*\d*,?\s*USA/gi,'')
      .replace(/,?\s*Nantucket,?\s*MA/gi,'').trim();
    item.innerHTML=`<span style="font-size:18px;">📍</span>
      <div>
        <div style="font-weight:700;">${main}</div>
        ${sec?`<div style="font-size:12px;opacity:.5;margin-top:2px;">${sec}</div>`:''}
      </div>`;
    item.addEventListener('click', ()=>selectPrediction(pred));
    acDropdown.appendChild(item);
  });
  positionDropdown();
  acDropdown.style.display='block';
}

function selectPrediction(pred){
  const input = document.getElementById('destination');
  placesService.getDetails({
    placeId: pred.place_id,
    fields: ['geometry','name','formatted_address'],
    sessionToken: sessionToken
  }, (place,status)=>{
    sessionToken = new google.maps.places.AutocompleteSessionToken(); // reset
    if(status!==google.maps.places.PlacesServiceStatus.OK||!place?.geometry){
      input.value = pred.structured_formatting?.main_text||pred.description;
      hideDropdown(); return;
    }
    const lat=place.geometry.location.lat(), lng=place.geometry.location.lng();
    if(!isOnNantucket(lat,lng)){
      // Not on island — still set text so user sees what happened, but don't store place
      input.value = pred.structured_formatting?.main_text||pred.description;
      hideDropdown(); return;
    }
    window.selectedPlace = place;
    input.value = place.name || pred.structured_formatting?.main_text || pred.description;
    hideDropdown();
    try{ calculateFare(); }catch(e){}
  });
}

function positionDropdown(){
  const input = document.getElementById('destination');
  if(!input||!acDropdown) return;
  const r = input.getBoundingClientRect();
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const spaceBelow = vh - r.bottom;
  const spaceAbove = r.top;
  const dropH = Math.min(220, acDropdown.scrollHeight || 220);
  if(spaceBelow >= dropH + 8 || spaceBelow >= spaceAbove) {
    // enough room below — show under input
    acDropdown.style.top    = (r.bottom + 4) + 'px';
    acDropdown.style.bottom = 'auto';
  } else {
    // show above input
    acDropdown.style.bottom = (vh - r.top + 4) + 'px';
    acDropdown.style.top    = 'auto';
  }
  acDropdown.style.left  = r.left + 'px';
  acDropdown.style.width = r.width + 'px';
}

function hideDropdown(){ if(acDropdown) acDropdown.style.display='none'; }
</script>

<script>
// ── Manual zone picker ───────────────────────────────────────
let gpsZoneName = null; // последняя зона от GPS
let zoneIsManual = false;

// Все зоны из fareTable (уникальные, отсортированные)
const ALL_ZONES = [...new Set(
  Object.keys(fareTable).flatMap(k => k.split('-'))
)].filter(z => z !== 'Cross Town').sort();

function openZonePicker(){
  const overlay = document.createElement('div');
  overlay.className = 'zone-picker-overlay';
  overlay.id = 'zonePickerOverlay';
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeZonePicker(); });

  const sheet = document.createElement('div');
  sheet.className = 'zone-picker-sheet';

  // Header
  sheet.innerHTML = `
    <div style="text-align:center;padding:12px 0 4px;">
      <div style="width:40px;height:4px;background:#333;border-radius:2px;margin:0 auto 14px;"></div>
      <div style="font-size:18px;font-weight:800;margin-bottom:12px;">Current Zone</div>
    </div>
    <div class="zone-picker-item ${!zoneIsManual?'selected':''}" onclick="setZoneManual(null)">
      <span>📍 Use GPS</span>
      ${!zoneIsManual?'<span style="font-size:20px;">✓</span>':''}
    </div>
    ${ALL_ZONES.map(z=>`
      <div class="zone-picker-item ${zoneIsManual&&currentZoneName===z?'selected':''}" onclick="setZoneManual('${z.replace(/'/g,"\\'")}')">
        <span>${z}</span>
        ${zoneIsManual&&currentZoneName===z?'<span style="font-size:20px;">✓</span>':''}
      </div>
    `).join('')}
  `;

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

function closeZonePicker(){
  const el = document.getElementById('zonePickerOverlay');
  if(el) el.remove();
}

function setZoneManual(zone){
  closeZonePicker();
  if(zone === null){
    // Вернуть GPS
    zoneIsManual = false;
    currentZoneName = gpsZoneName;
    document.getElementById('currentZone').innerText = gpsZoneName || 'Detecting...';
    document.getElementById('zoneSourceIcon').innerText = '📍 GPS';
    document.getElementById('zoneSourceIcon').style.color = '';
  } else {
    zoneIsManual = true;
    currentZoneName = zone;
    document.getElementById('currentZone').innerText = zone;
    document.getElementById('zoneSourceIcon').innerText = '✋ Manual';
    document.getElementById('zoneSourceIcon').style.color = '#ff9f0a';
  }
  try{ calculateFare(); }catch(e){}
}
</script>
