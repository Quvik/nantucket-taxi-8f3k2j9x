
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nantucket Taxi Fare Calculator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #101010;
    color: white;
}

#topbar {
    padding: 12px;
    background: #1a1a1a;
}

input, select, button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:active {
    transform: scale(0.98);
}

#map {
    height: 42vh;
    margin-bottom: 120px;
}

.quick-row {
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:4px;
}

.quick-btn {
    min-width:140px;
    background:#2b2b2b;
    color:white;
    border:none;
    border-radius:18px;
    padding:16px;
    font-size:17px;
    font-weight:bold;
}

.fare-card {
    background:#111;
    border:2px solid #2d2d2d;
}

.breakdown-row {
    display:flex;
    justify-content:space-between;
    margin-top:8px;
    opacity:0.9;
}

.sticky-bar {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#161616;
    border-top:1px solid #333;
    padding:12px;
    display:flex;
    gap:10px;
    z-index:9999;
}

.sticky-bar button {
    flex:1;
    border-radius:16px;
    font-size:18px;
    padding:18px;
}

.primary-btn {
    background:#0A84FF;
    color:white;
}

.secondary-btn {
    background:#2b2b2b;
    color:white;
}

.card {
    padding: 14px;
    background: #1f1f1f;
    border-radius: 12px;
    margin-top: 10px;
}

.big {
    font-size: 24px;
    font-weight: bold;
}

.small {
    opacity: 0.8;
    margin-top: 6px;
}
</style>
</head>
<body>

<div id="topbar">

    <div class="card fare-card">
        <div>Current Zone</div>
        <div class="big" id="currentZone">Detecting...</div>
    </div>

    <input id="destination" placeholder="Start typing and SELECT suggestion..."/>


    <select id="passengers">
        <option value="1">1 Passenger</option>
        <option value="2">2 Passengers</option>
        <option value="3">3 Passengers</option>
        <option value="4">4 Passengers</option>
        <option value="5">5 Passengers</option>
        <option value="6">6 Passengers</option>
    </select>

    <div class="card">
        <label><input type="checkbox" id="nightFee"> Night fee +$5</label><br><br>
        <label><input type="checkbox" id="dirtRoad"> Dirt road +$5</label><br><br>

        Dogs:
        <select id="dogs">
            <option value="0">0 Dogs</option>
            <option value="1">1 Dog</option>
            <option value="2">2 Dogs</option>
            <option value="3">3 Dogs</option>
        </select>

        <br><br>

        Bikes:
        <select id="bikes">
            <option value="0">0 Bikes</option>
            <option value="1">1 Bike</option>
            <option value="2">2 Bikes</option>
            <option value="3">3 Bikes</option>
        </select>

        <br><br>

        Extra Bags:
        <select id="bags">
            <option value="0">0 Extra Bags</option>
            <option value="1">1 Extra Bag</option>
            <option value="2">2 Extra Bags</option>
            <option value="3">3 Extra Bags</option>
            <option value="4">4 Extra Bags</option>
        </select>
    </div>

    
    

<div class="card">
<div style="margin-bottom:12px;font-weight:bold;font-size:20px;">
Quick Favorites
</div>

<div class="quick-row">

<button class="quick-btn" onclick="setDestination('Airport')">✈️ Airport</button>

<button class="quick-btn" onclick="setDestination('Steamship Ferry')">⛴ Ferry</button>

<button class="quick-btn" onclick="setDestination('White Elephant')">🏨 White Elephant</button>

<button class="quick-btn" onclick="setDestination('Cisco Brewers')">🍺 Cisco</button>

<button class="quick-btn" onclick="setDestination('The Wauwinet')">🌊 Wauwinet</button>

<button class="quick-btn" onclick="setDestination('The Nantucket Hotel')">🏨 Nantucket Hotel</button>

</div>
</div>




<div class="sticky-bar">

<button class="primary-btn" onclick="calculateFare()">
Calculate
</button>

<button class="secondary-btn" onclick="openWaze()">
Waze
</button>

<button class="secondary-btn" onclick="openGoogleMaps()">
Maps
</button>

</div>



    <div class="card">
        <div>Destination Zone</div>
        <div class="big" id="destinationZone">-</div>
    </div>

    <div class="card">
        <div>Total Fare</div>
        <div class="big" id="fare">$ -</div>
        <div class="small" id="fareBreakdown"></div>
    </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>

const fareTable = {

    // AIRPORT
    "Airport-Cisco/ Miacomet": 32,
    "Airport-Dionis": 35,
    "Airport-Eel Point": 40,
    "Airport-Hoicks Hollow": 36,
    "Airport-Low Beach": 32,
    "Airport-Madaket": 47,
    "Airport-Madequecham Valley": 32,
    "Airport-Massassoit Bridge": 49,
    "Airport-Mid Island A": 21,
    "Airport-Mid - Island B": 21,
    "Airport-Mid Island C": 26,
    "Airport-Pocomo": 37,
    "Airport-Polpis": 32,
    "Airport-Quaise": 27,
    "Airport-Quidnet": 37,
    "Airport-Sankaty Light": 35,
    "Airport-Shimo": 23,
    "Airport-Siasconset": 31,
    "Airport-Tom Nevers": 27,
    "Airport-Town": 23,
    "Airport-Wauwinet": 42,
    "Airport-Cross Town": 27,
    "Airport-Squam": 44,

    // TOWN
    "Town-Cisco/ Miacomet": 25,
    "Town-Dionis": 24,
    "Town-Eel Point": 30,
    "Town-Hoicks Hollow": 40,
    "Town-Low Beach": 36,
    "Town-Madaket": 31,
    "Town-Madequecham Valley": 37,
    "Town-Massassoit Bridge": 39,
    "Town-Mid Island A": 17,
    "Town-Mid - Island B": 20,
    "Town-Mid Island C": 22,
    "Town-Pocomo": 37,
    "Town-Polpis": 32,
    "Town-Quaise": 27,
    "Town-Quidnet": 37,
    "Town-Sankaty Light": 39,
    "Town-Shimo": 23,
    "Town-Siasconset": 35,
    "Town-Tom Nevers": 30,
    "Town-Airport": 23,
    "Town-Wauwinet": 42,
    "Town-Squam": 44,

    // CROSS ISLAND
    "Wauwinet-Siasconset": 50,
    "Madaket-Siasconset": 65,
    "Wauwinet-Madaket": 70
};

let currentZoneName = null;
let zonesGeoJSON = null;

const map = L.map('map').setView([41.2835, -70.0995], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

fetch('zones.kml')
.then(res => res.text())
.then(kmlText => {

    const parser = new DOMParser();
    const kml = parser.parseFromString(kmlText, 'text/xml');

    zonesGeoJSON = toGeoJSON.kml(kml);

    const layer = L.geoJSON(zonesGeoJSON, {
        style: {
            color: '#00bfff',
            weight: 2,
            fillOpacity: 0.2
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

    detectCurrentLocation();
});

function detectCurrentLocation() {

    navigator.geolocation.getCurrentPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const point = turf.point([lng, lat]);

        L.marker([lat, lng]).addTo(map);

        currentZoneName = findZone(point);

        // Safety fallback
        if (currentZoneName === 'Cross Town') {
            currentZoneName = 'Town';
        }

        document.getElementById('currentZone').innerText =
            currentZoneName || 'Unknown';

    }, err => {
        alert('Allow location access');
    });
}

function findZone(point) {

    let fallbackZone = null;

    for (const feature of zonesGeoJSON.features) {

        try {

            if (turf.booleanPointInPolygon(point, feature)) {

                const zoneName =
                    feature.properties.name || "Unknown";

                // Ignore Cross Town overlay zone
                if (zoneName === 'Cross Town') {
                    fallbackZone = 'Town';
                    continue;
                }

                return zoneName;
            }

        } catch(e) {}
    }

    return fallbackZone;
}

function getFare(fromZone, toZone) {

    const direct = `${fromZone}-${toZone}`;
    const reverse = `${toZone}-${fromZone}`;

    return fareTable[direct] || fareTable[reverse] || null;
}


let lastDestinationAddress = "";

let localPlaces = [];

fetch('places.json')
.then(r => r.json())
.then(data => {
    localPlaces = data;
})
.catch(() => {});



function setDestination(placeName) {

    const input = document.getElementById('destination');

    input.value = placeName;

    lastDestinationAddress = placeName;
}


function openGoogleMaps() {

    if (!lastDestinationAddress) {
        alert("Calculate fare first");
        return;
    }

    const url =
        `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lastDestinationAddress)}`;

    window.open(url, '_blank');
}

function openWaze() {

    if (!lastDestinationAddress) {
        alert("Calculate fare first");
        return;
    }

    const url =
        `https://waze.com/ul?q=${encodeURIComponent(lastDestinationAddress)}&navigate=yes`;

    window.open(url, '_blank');
}



// AUTOCOMPLETE
window.addEventListener('load', () => {

    const destinationInput = document.getElementById('destination');
    const suggestionList = document.getElementById('suggestions');

    if (!destinationInput || !suggestionList) return;

    destinationInput.addEventListener('input', async function() {

        window.selectedPlace = null;

        const query = destinationInput.value;

        if (query.length < 2) return;

        try {

            const url =
                `https://photon.komoot.io/api/?q=${encodeURIComponent(query + " Nantucket")}&limit=5`;

            const response = await fetch(url);
            const data = await response.json();

            suggestionList.innerHTML = "";

            if (data.features) {

                data.features.forEach(feature => {

                    const option = document.createElement('option');

                    let label =
                        feature.properties.name || "";

                    if (
                        feature.properties.street &&
                        !label.includes(feature.properties.street)
                    ) {
                        label += " - " + feature.properties.street;
                    }

                    option.value = label;

                    suggestionList.appendChild(option);
                });
            }

        } catch(e) {
            console.log(e);
        }

    });

});


async function calculateFare() {

    const address = document.getElementById('destination').value.trim();

    if (!address) {
        alert('Enter destination');
        return;
    }

    lastDestinationAddress = address;

    const passengers =
        parseInt(document.getElementById('passengers').value);

    const extraPassengers =
        Math.max(0, passengers - 1);

    const passengerCharge =
        extraPassengers * 3;

    const dogs =
        parseInt(document.getElementById('dogs').value);

    const dogCharge = dogs * 5;

    const bikes =
        parseInt(document.getElementById('bikes').value);

    const bikeCharge = bikes * 5;

    const bags =
        parseInt(document.getElementById('bags').value);

    const bagCharge = bags * 2;

    const nightCharge =
        document.getElementById('nightFee').checked ? 5 : 0;

    const dirtCharge =
        document.getElementById('dirtRoad').checked ? 5 : 0;

    let destinationZone = null;
    let lat = null;
    let lng = null;

    // LOCAL DATABASE FIRST
    const localMatch = localPlaces.find(p =>
        p.name.toLowerCase() === address.toLowerCase() ||
        address.toLowerCase().includes(p.name.toLowerCase())
    );

    if (localMatch) {

        destinationZone = localMatch.zone;

    } else if (
        window.selectedPlace &&
        window.selectedPlace.geometry
    ) {

        lat =
            window.selectedPlace.geometry.location.lat();

        lng =
            window.selectedPlace.geometry.location.lng();

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);

    } else {

        const url =
            `https://photon.komoot.io/api/?q=${encodeURIComponent(address + " Nantucket")}&limit=5`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.features || !data.features.length) {
            alert('Place not found');
            return;
        }

        const best = data.features[0];

        lat = best.geometry.coordinates[1];
        lng = best.geometry.coordinates[0];

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);
    }

    if (destinationZone === 'Cross Town') {
        destinationZone = 'Town';
    }

    document.getElementById('destinationZone').innerText =
        destinationZone || 'Unknown';

    if (!currentZoneName || !destinationZone) {
        document.getElementById('fare').innerText = '$ ?';
        return;
    }

    let baseFare = getFare(currentZoneName, destinationZone);

    if (
        currentZoneName === 'Town' &&
        destinationZone === 'Town'
    ) {
        baseFare = 14;
    }

    if (!baseFare) {
        document.getElementById('fare').innerText =
            'No fare found';
        return;
    }

    const totalFare =
        baseFare +
        passengerCharge +
        dogCharge +
        bikeCharge +
        bagCharge +
        nightCharge +
        dirtCharge;

    document.getElementById('fare').innerText =
        `$${totalFare}`;

    document.getElementById('fareBreakdown').innerHTML =
        `
<div class="breakdown-row"><span>Base Fare</span><span>$${baseFare}</span></div>
<div class="breakdown-row"><span>Passengers</span><span>$${passengerCharge}</span></div>
<div class="breakdown-row"><span>Dogs</span><span>$${dogCharge}</span></div>
<div class="breakdown-row"><span>Bikes</span><span>$${bikeCharge}</span></div>
<div class="breakdown-row"><span>Bags</span><span>$${bagCharge}</span></div>
<div class="breakdown-row"><span>Night Fee</span><span>$${nightCharge}</span></div>
<div class="breakdown-row"><span>Dirt Road</span><span>$${dirtCharge}</span></div>
<hr style="border-color:#333;margin-top:12px;">
<div class="breakdown-row" style="font-size:20px;font-weight:bold;">
<span>Total</span><span>$${totalFare}</span>
</div>
`;

    if (lat && lng) {

        L.marker([lat, lng]).addTo(map);

        map.setView([lat, lng], 14);
    }
}

</script>


<script>
let autocomplete;

function initAutocomplete() {

    const input = document.getElementById('destination');

    const nantucketBounds = {
        north: 41.340,
        south: 41.230,
        west: -70.240,
        east: -69.950
    };

    autocomplete = new google.maps.places.Autocomplete(input, {
        types: ['geocode', 'establishment'],
        componentRestrictions: { country: 'us' },
        bounds: nantucketBounds,
        strictBounds: true,
        fields: ['geometry', 'name', 'formatted_address']
    });

    autocomplete.addListener('place_changed', () => {

        const place = autocomplete.getPlace();

        if (!place.geometry) return;

        window.selectedPlace = place;
    });
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyChh4QTDtpcj9u_QwchPjZ5jE9B1VIl1wM&libraries=places&callback=initAutocomplete">
</script>

</body>
</html>
