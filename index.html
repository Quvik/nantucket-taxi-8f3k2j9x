};

let currentZoneName = null;
let zonesGeoJSON = null;

const map = L.map('map').setView([41.2835, -70.0995], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

fetch('zones.kml')
.then(res => res.text())
.then(kmlText => {

    const parser = new DOMParser();
    const kml = parser.parseFromString(kmlText, 'text/xml');

    zonesGeoJSON = toGeoJSON.kml(kml);

    const layer = L.geoJSON(zonesGeoJSON, {
        style: {
            color: '#00bfff',
            weight: 2,
            fillOpacity: 0.2
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

    detectCurrentLocation();
});

function detectCurrentLocation() {

    navigator.geolocation.getCurrentPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const point = turf.point([lng, lat]);

        L.marker([lat, lng]).addTo(map);

        currentZoneName = findZone(point);

        // Safety fallback
        if (currentZoneName === 'Cross Town') {
            currentZoneName = 'Town';
        }

        document.getElementById('currentZone').innerText =
            currentZoneName || 'Unknown';

    }, err => {
        alert('Allow location access');
    });
}

function findZone(point) {

    let fallbackZone = null;

    for (const feature of zonesGeoJSON.features) {

        try {

            if (turf.booleanPointInPolygon(point, feature)) {

                const zoneName =
                    feature.properties.name || "Unknown";

                // Ignore Cross Town overlay zone
                if (zoneName === 'Cross Town') {
                    fallbackZone = 'Town';
                    continue;
                }

                return zoneName;
            }

        } catch(e) {}
    }

    return fallbackZone;
}

function getFare(fromZone, toZone) {

    const direct = `${fromZone}-${toZone}`;
    const reverse = `${toZone}-${fromZone}`;

    return fareTable[direct] || fareTable[reverse] || null;
}

document.getElementById('splashScreen');

splash.remove();

'destination',
'passengers',
'dogs',
'bikes',
'bags',
'nightFee',
'dirtRoad'

watched.forEach(id=>{

const el = document.getElementById(id);

el.addEventListener('input',autoCalculate);
el.addEventListener('change',autoCalculate);

});

document.querySelectorAll('.tab-btn').forEach(b=>{

  startFerryTick();
} else {
  stopFerryTick();
}
}

// ─── State ────────────────────────────────────────────────────────────────────
let ferryDayOffset   = 0;
let ferryCountdownId = null;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function ferryTargetDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + (offset || 0));
  return d;
}

function dateKey(d) {
  // "YYYY-MM-DD"
  return d.toISOString().slice(0, 10);
}

function ferryDateLabel(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  const diff = Math.round((dd - t) / 86400000);
  if (diff === 0) return 'Сегодня';
  if (diff === 1) return 'Завтра';
  if (diff === -1) return 'Вчера';
  return d.toLocaleDateString('ru-RU', { weekday:'short', day:'numeric', month:'short' });
}

function getSeason(d) {
  const key = dateKey(d);
  return FERRY_SEASONS.find(s => key >= s.from && key <= s.to) || null;
}

function parseFerryTime(timeStr, baseDate) {
  const [t, mod] = timeStr.trim().split(' ');
  let [h, m] = t.split(':').map(Number);
  if (mod === 'PM' && h !== 12) h += 12;
  if (mod === 'AM' && h === 12) h = 0;
  const d = new Date(baseDate);
  d.setHours(h, m, 0, 0);
  return d;
}

function fmtCountdown(ms) {
  if (ms <= 0) return 'Прибыл';
  const mins = Math.floor(ms / 60000);
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h > 0) return `${h}ч ${m}м`;
  return `${m} мин`;
}

function lineEmoji(line) {
  if (line.includes('Steam'))   return '🚢';
  if (line.includes('Hy'))      return '🚤';
  if (line.includes('Sea'))     return '⛴';
  if (line.includes('Free'))    return '🛥';
  return '⛵';
}
function lineColor(line) {
  if (line.includes('Steam'))   return '#0A84FF';
  if (line.includes('Hy'))      return '#30d158';
  if (line.includes('Sea'))     return '#ff9f0a';
  if (line.includes('Free'))    return '#bf5af2';
  return '#aaa';
}

// ─── Build arrival list for a given date ──────────────────────────────────────
function buildArrivals(targetDate) {
  const season = getSeason(targetDate);
  if (!season) return null;

  const dow = targetDate.getDay(); // 0=Sun … 6=Sat

  return season.arrivals
    .filter(a => !a.days || a.days.includes(dow))
    .map(a => ({ ...a, dateObj: parseFerryTime(a.time, targetDate) }))
    .sort((a, b) => a.dateObj - b.dateObj);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderFerryTab() {
  const targetDate = ferryTargetDate(ferryDayOffset);
  document.getElementById('ferryDateLabel').innerText = ferryDateLabel(targetDate);

  const arrivals = buildArrivals(targetDate);

  if (!arrivals) {
    document.getElementById('ferryArrivalsContainer').innerHTML =
      `<div class="card" style="text-align:center;padding:28px;opacity:.6;">
         Нет данных для этой даты.<br>Проверь <a href="https://www.nantucketferries.com" target="_blank" style="color:#0A84FF;">nantucketferries.com</a>
       </div>`;
    document.getElementById('rushIndicatorCard').innerHTML =
      `<div style="opacity:.6;font-size:14px;">Статус</div>
       <div style="font-size:18px;font-weight:800;margin-top:4px;">📅 Нет расписания</div>`;
    return;
  }

  const now = new Date();
  const upcoming = arrivals.filter(a => a.dateObj > now);
  const past     = arrivals.filter(a => a.dateObj <= now);

  // Rush indicator
  renderRush(upcoming, now);

  // Cards
  let html = '';

  const season = getSeason(targetDate);
  if (season) {
    html += `<div style="font-size:12px;color:#0A84FF;font-weight:700;letter-spacing:.5px;margin-bottom:8px;opacity:.8;">
               📋 СЕЗОН: ${season.label}
             </div>`;
  }

  if (upcoming.length === 0 && past.length === 0) {
    html += `<div class="card" style="text-align:center;padding:24px;opacity:.6;">Паромов нет</div>`;
  }

  // — Upcoming ————
  if (upcoming.length > 0) {
    html += `<div style="font-size:12px;font-weight:700;opacity:.45;margin-bottom:8px;letter-spacing:1px;">СЛЕДУЮЩИЕ</div>`;
    upcoming.forEach((a, i) => {
      const isNext = i === 0;
      const minsLeft = Math.floor((a.dateObj - now) / 60000);
      const urgent = minsLeft <= 20;
      html += `
      <div class="ferry-row-card" data-iso="${a.dateObj.toISOString()}" style="
        background:${isNext ? (urgent ? '#2a1200' : '#12201a') : '#17181c'};
        border:1px solid ${isNext ? (urgent ? '#ff9f0a' : '#30d158') : '#2a2a2a'};
        border-radius:16px; padding:14px 16px; margin-bottom:10px;
        display:flex; align-items:center; justify-content:space-between;
      ">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:26px;">${lineEmoji(a.line)}</div>
          <div>
            <div style="font-size:19px;font-weight:800;">${a.time}</div>
            <div style="font-size:13px;color:${lineColor(a.line)};font-weight:600;">${a.line}</div>
            <div style="font-size:12px;opacity:.55;">из ${a.from} · ${a.type}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="cd-val" style="font-size:16px;font-weight:800;color:${urgent && isNext ? '#ff9f0a' : 'white'};">
            ${fmtCountdown(a.dateObj - now)}
          </div>
          ${isNext ? `<div style="font-size:10px;color:${urgent ? '#ff9f0a' : '#30d158'};font-weight:800;margin-top:3px;">
            ${urgent ? '⚡ СКОРО!' : '▶ СЛЕДУЮЩИЙ'}
          </div>` : ''}
        </div>
      </div>`;
    });
  }

  // — Past ————
  if (past.length > 0) {
    html += `<div style="font-size:12px;font-weight:700;opacity:.35;margin:14px 0 8px;letter-spacing:1px;">УЖЕ ПРИБЫЛИ</div>`;
    past.slice().reverse().forEach(a => {
      html += `
      <div style="
        background:#111; border:1px solid #1e1e1e; border-radius:14px;
        padding:11px 14px; margin-bottom:8px; opacity:.4;
        display:flex; align-items:center; justify-content:space-between;
      ">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:20px;">${lineEmoji(a.line)}</div>
          <div>
            <div style="font-size:16px;font-weight:700;text-decoration:line-through;">${a.time}</div>
            <div style="font-size:12px;color:${lineColor(a.line)};">${a.line} · из ${a.from}</div>
          </div>
        </div>
        <div style="font-size:12px;">✓</div>
      </div>`;
    });
  }

  document.getElementById('ferryArrivalsContainer').innerHTML = html;

  // Last updated
  document.getElementById('ferryLastUpdated').innerText =
    `Данные: nantucketferries.com · ${new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}`;
}

function renderRush(upcoming, now) {
  const card = document.getElementById('rushIndicatorCard');
  if (!upcoming || upcoming.length === 0) {
    card.innerHTML = `<div style="opacity:.5;font-size:14px;">Статус</div>
      <div style="font-size:20px;font-weight:800;margin-top:4px;">🌙 Больше паромов нет</div>`;
    return;
  }
  const next = upcoming[0];
  const mins = Math.floor((next.dateObj - now) / 60000);
  let icon, color, msg, sub;
  if (mins <= 20) {
    icon='🚨'; color='#ff453a';
    msg=`Паром через ${mins} мин!`;
    sub=`${lineEmoji(next.line)} ${next.line} · ${next.time} из ${next.from}`;
  } else if (mins <= 45) {
    icon='⚠️'; color='#ffd60a';
    msg=`Паром через ${Math.floor(mins/60)?Math.floor(mins/60)+'ч ':''} ${mins%60}мин`;
    sub=`${lineEmoji(next.line)} ${next.line} · ${next.time} из ${next.from}`;
  } else {
    icon='🟢'; color='#30d158';
    const h=Math.floor(mins/60), m=mins%60;
    msg=`Спокойно · ${h?h+'ч ':''}${m}м до парома`;
    sub=`${lineEmoji(next.line)} ${next.line} прибудет в ${next.time}`;
  }
  card.innerHTML = `
    <div style="opacity:.6;font-size:13px;">Статус</div>
    <div style="font-size:22px;font-weight:900;color:${color};margin-top:4px;">${icon} ${msg}</div>
    <div style="font-size:14px;opacity:.75;margin-top:6px;">${sub}</div>`;
}

// ─── Countdown tick (every 30s) ───────────────────────────────────────────────
function startFerryTick() {
  stopFerryTick();
  ferryCountdownId = setInterval(() => {
    // Update countdown values in-place
    const now = new Date();
    document.querySelectorAll('.ferry-row-card').forEach(row => {
      const iso = row.getAttribute('data-iso');
      if (!iso) return;
      const d = new Date(iso);
      const ms = d - now;
      const cdEl = row.querySelector('.cd-val');
      if (cdEl) cdEl.innerText = fmtCountdown(ms);
      // Move to past if expired
      if (ms <= 0) renderFerryTab();
    });
    // Re-render rush indicator
    const targetDate = ferryTargetDate(ferryDayOffset);
    const arrivals = buildArrivals(targetDate);
    if (arrivals) {
      const upcoming = arrivals.filter(a => a.dateObj > now);
      renderRush(upcoming, now);
    }
  }, 30000);
}
function stopFerryTick() {
  if (ferryCountdownId) clearInterval(ferryCountdownId);
  ferryCountdownId = null;
}

// ─── Day navigation ──────────────────────────────────────────────────────────
function shiftFerryDay(delta) {
  ferryDayOffset = Math.max(0, ferryDayOffset + delta);
  renderFerryTab();
}

function changeValue(id, delta){

const input = document.getElementById(id);
const display = document.getElementById(id + 'Value');

let current = parseInt(input.value || 0);

const limits = {
passengers:[1,6],
dogs:[0,3],
bikes:[0,3],
bags:[0,4]
};

const min = limits[id][0];
const max = limits[id][1];

current += delta;

if(current < min) current = min;
if(current > max) current = max;

input.value = current;

if(id === 'passengers'){
display.innerText = current;
}else{
display.innerText = current;
}
}

// AUTOCOMPLETE
window.addEventListener('load', () => {

    const destinationInput = document.getElementById('destination');
    const suggestionList = document.getElementById('suggestions');

    if (!destinationInput || !suggestionList) return;

    destinationInput.addEventListener('input', async function() {

        window.selectedPlace = null;

        const query = destinationInput.value;

        if (query.length < 2) return;

        try {

            const url =
                `https://photon.komoot.io/api/?q=${encodeURIComponent(query + " Nantucket")}&limit=5`;

            const response = await fetch(url);
            const data = await response.json();

            suggestionList.innerHTML = "";

            if (data.features) {

                data.features.forEach(feature => {

                    const option = document.createElement('option');

                    let label =
                        feature.properties.name || "";

                    if (
                        feature.properties.street &&
                        !label.includes(feature.properties.street)
                    ) {
                        label += " - " + feature.properties.street;
                    }

                    option.value = label;

                    suggestionList.appendChild(option);
                });
            }

        } catch(e) {
            console.log(e);
        }

    });

});


async function calculateFare() {

    const address = document.getElementById('destination').value.trim();

    if (!address) {
        alert('Enter destination');
        return;
    }

    lastDestinationAddress = address;

    const passengers =
        parseInt(document.getElementById('passengers').value);

    const extraPassengers =
        Math.max(0, passengers - 1);

    const passengerCharge =
        extraPassengers * 3;

    const dogs =
        parseInt(document.getElementById('dogs').value);

    const dogCharge = dogs * 5;

    const bikes =
        parseInt(document.getElementById('bikes').value);

    const bikeCharge = bikes * 5;

    const bags =
        parseInt(document.getElementById('bags').value);

    const bagCharge = bags * 2;

    const nightCharge =
        document.getElementById('nightFee').checked ? 5 : 0;

    const dirtCharge =
        document.getElementById('dirtRoad').checked ? 5 : 0;

    let destinationZone = null;
    let lat = null;
    let lng = null;

    // LOCAL DATABASE FIRST
    const localMatch = localPlaces.find(p =>
        p.name.toLowerCase() === address.toLowerCase() ||
        address.toLowerCase().includes(p.name.toLowerCase())
    );

    if (localMatch) {

        destinationZone = localMatch.zone;

    } else if (
        window.selectedPlace &&
        window.selectedPlace.geometry
    ) {

        lat =
            window.selectedPlace.geometry.location.lat();

        lng =
            window.selectedPlace.geometry.location.lng();

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);

    } else {

        const url =
            `https://photon.komoot.io/api/?q=${encodeURIComponent(address + " Nantucket")}&limit=5`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.features || !data.features.length) {
            alert('Place not found');
            return;
        }

        const best = data.features[0];

        lat = best.geometry.coordinates[1];
        lng = best.geometry.coordinates[0];

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);
    }

    if (destinationZone === 'Cross Town') {
        destinationZone = 'Town';
    }

    document.getElementById('destinationZone').innerText =
        destinationZone || 'Unknown';

    if (!currentZoneName || !destinationZone) {
        document.getElementById('fare').innerText = '$ ?';
        return;
    }

    let baseFare = getFare(currentZoneName, destinationZone);

    if (
        currentZoneName === 'Town' &&
        destinationZone === 'Town'
    ) {
        baseFare = 14;
    }

    if (!baseFare) {
        document.getElementById('fare').innerText =
            'No fare found';
        return;
    }

    const totalFare =
        baseFare +
        passengerCharge +
        dogCharge +
        bikeCharge +
        bagCharge +
        nightCharge +
        dirtCharge;

    document.getElementById('fare').innerText =
        `$${totalFare}`;

    document.getElementById('fareBreakdown').innerHTML =
`
<div class="fare-row"><span>Base Fare</span><span>$${baseFare}</span></div>
<div class="fare-row"><span>Passengers</span><span>$${passengerCharge}</span></div>
<div class="fare-row"><span>Dogs</span><span>$${dogCharge}</span></div>
<div class="fare-row"><span>Bikes</span><span>$${bikeCharge}</span></div>
<div class="fare-row"><span>Bags</span><span>$${bagCharge}</span></div>
<div class="fare-row"><span>Night Fee</span><span>$${nightCharge}</span></div>
<div class="fare-row"><span>Dirt Road</span><span>$${dirtCharge}</span></div>

<div class="total-row">
<span>Total</span>
<span>$${totalFare}</span>
</div>
`;

    if (lat && lng) {

        L.marker([lat, lng]).addTo(map);

        map.setView([lat, lng], 14);
    }
}

</script>



<script>
let autocomplete;

function initAutocomplete() {

    const input = document.getElementById('destination');

    const nantucketBounds = new google.maps.LatLngBounds(
        new google.maps.LatLng(41.230, -70.240),
        new google.maps.LatLng(41.340, -69.950)
    );

    autocomplete = new google.maps.places.Autocomplete(input, {
        types: ['geocode','establishment'],
        componentRestrictions: { country:'us' },
        bounds: nantucketBounds,
        strictBounds: false,
        fields:['geometry','name','formatted_address']
    });

    autocomplete.setBounds(nantucketBounds);

    autocomplete.addListener('place_changed', () => {

        const place = autocomplete.getPlace();

        if (!place || !place.geometry) return;

        window.selectedPlace = place;
    });

    // Hide non Nantucket suggestions visually
    const observer = new MutationObserver(() => {

        document.querySelectorAll('.pac-item').forEach(item => {

            const txt = item.innerText.toLowerCase();

            const allItems =
                Array.from(document.querySelectorAll('.pac-item'));

            const hasNantucket =
                allItems.some(el =>
                    el.innerText.toLowerCase().includes('nantucket')
                );

            // Only filter when Nantucket results exist
            if (hasNantucket) {

                if (!txt.includes('nantucket')) {
                    item.style.display = 'none';
                } else {
                    item.style.display = 'block';

                    // Clean text
                    item.innerHTML =
                        item.innerHTML
                            .replace(/,\s*Nantucket,\s*MA,\s*USA/gi,'')
                            .replace(/Nantucket,\s*MA,\s*USA/gi,'');
                }

            } else {

                // Show all until Nantucket appears
                item.style.display = 'block';
            }
        });
    });

    observer.observe(document.body,{
        childList:true,
        subtree:true
    });
}
</script>
