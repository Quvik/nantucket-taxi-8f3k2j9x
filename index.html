let currentZoneName = null;
let zonesGeoJSON = null;

const map = L.map('map').setView([41.2835, -70.0995], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

fetch('zones.kml')
.then(res => res.text())
.then(kmlText => {

    const parser = new DOMParser();
    const kml = parser.parseFromString(kmlText, 'text/xml');

    zonesGeoJSON = toGeoJSON.kml(kml);

    const layer = L.geoJSON(zonesGeoJSON, {
        style: {
            color: '#00bfff',
            weight: 2,
            fillOpacity: 0.2
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

    detectCurrentLocation();
});

function detectCurrentLocation() {

    navigator.geolocation.getCurrentPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const point = turf.point([lng, lat]);

        L.marker([lat, lng]).addTo(map);

        currentZoneName = findZone(point);

        // Safety fallback
        if (currentZoneName === 'Cross Town') {
            currentZoneName = 'Town';
        }

        document.getElementById('currentZone').innerText =
            currentZoneName || 'Unknown';

    }, err => {
        alert('Allow location access');
    });
}

function findZone(point) {

    let fallbackZone = null;

    for (const feature of zonesGeoJSON.features) {

        try {

            if (turf.booleanPointInPolygon(point, feature)) {

                const zoneName =
                    feature.properties.name || "Unknown";

                // Ignore Cross Town overlay zone
                if (zoneName === 'Cross Town') {
                    fallbackZone = 'Town';
                    continue;
                }

                return zoneName;
            }

        } catch(e) {}
    }

    return fallbackZone;
}

function getFare(fromZone, toZone) {

    const direct = `${fromZone}-${toZone}`;
    const reverse = `${toZone}-${fromZone}`;

    return fareTable[direct] || fareTable[reverse] || null;
}

let autoCalcTimeout = null;
let isCalculatingFare = false;

function resetFarePreview(){

document.getElementById('destinationZone').innerText = '-';
document.getElementById('fare').innerText = '$ -';
document.getElementById('fareBreakdown').innerHTML = '';

window.selectedPlace = null;
}

function autoCalculate(){

const destination =
document.getElementById('destination').value.trim();

clearTimeout(autoCalcTimeout);

if(destination.length < 3){

resetFarePreview();
return;
}

autoCalcTimeout = setTimeout(async ()=>{

if(isCalculatingFare) return;

try{

isCalculatingFare = true;

await calculateFare();

}catch(e){
console.log(e);
}finally{
isCalculatingFare = false;
}

}, 350);
}

window.addEventListener('load',()=>{

setTimeout(()=>{
const splash =
document.getElementById('splashScreen');

if(splash){
splash.style.opacity='0';

setTimeout(()=>{
splash.remove();
},500);
}
},1200);

const watched = [
'destination',
'passengers',
'dogs',
'bikes',
'bags',
'nightFee',
'dirtRoad'
];

watched.forEach(id=>{

const el = document.getElementById(id);

if(!el) return;

el.addEventListener('input',autoCalculate);
el.addEventListener('change',autoCalculate);

});
});

// ── State ──────────────────────────────────────────────────────
let ferryDayOffset   = 0;
let ferryTickId      = null;
let ferryLiveCache   = {}; // date-key → parsed arrivals from live scrape

// ── Helpers ───────────────────────────────────────────────────
function ferryTargetDate(off) {
  const d = new Date();
  d.setDate(d.getDate() + (off||0));
  return d;
}
function dateKey(d) { return d.toISOString().slice(0,10); }
function ferryLabel(d) {
  const diff = Math.round((new Date(dateKey(d)) - new Date(dateKey(new Date()))) / 86400000);
  if (diff===0) return 'Сегодня';
  if (diff===1) return 'Завтра';
  if (diff===-1) return 'Вчера';
  return d.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'});
}
function parseFT(timeStr, base) {
  const [t,mod] = timeStr.trim().split(' ');
  let [h,m] = t.split(':').map(Number);
  if (mod==='PM'&&h!==12) h+=12;
  if (mod==='AM'&&h===12) h=0;
  const d = new Date(base); d.setHours(h,m,0,0); return d;
}
function fmtCD(ms) {
  if (ms<=0) return 'Прибыл';
  const m=Math.floor(ms/60000), h=Math.floor(m/60);
  return h>0 ? `${h}ч ${m%60}м` : `${m} мин`;
}
function lineEmoji(l){ return l.includes('Steam')?'🚢':l.includes('Hy')?'🚤':l.includes('Sea')?'⛴':l.includes('Free')?'🛥':'⛵'; }
function lineClr(l){ return l.includes('Steam')?'#0A84FF':l.includes('Hy')?'30d158':l.includes('Sea')?'#ff9f0a':l.includes('Free')?'#bf5af2':'#aaa'; }
function lineColor(l){ return l.includes('Steam')?'#0A84FF':l.includes('Hy')?'#30d158':l.includes('Sea')?'#ff9f0a':l.includes('Free')?'#bf5af2':'#aaa'; }

// ── Get built-in arrivals for date ────────────────────────────
function builtinArrivals(targetDate) {
  const key = dateKey(targetDate);
  const season = FERRY_BUILTIN.find(s => key >= s.from && key <= s.to);
  if (!season) return null;
  const dow = targetDate.getDay();
  return season.arrivals
    .filter(a => !a.days || a.days.includes(dow))
    .map(a => ({...a, dateObj: parseFT(a.time, targetDate), source:'builtin'}))
    .sort((a,b)=>a.dateObj-b.dateObj);
}

// ── LIVE SCRAPE via CORS proxy ─────────────────────────────────
// Tries multiple free proxies in order
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function scrapeLive() {
  const target = 'https://www.nantucketferries.com';
  let html = null;

  for (const makeUrl of PROXIES) {
    try {
      const r = await fetch(makeUrl(target), {signal: AbortSignal.timeout(8000)});
      if (r.ok) { html = await r.text(); break; }
    } catch(e) { /* try next */ }
  }

  if (!html) return null;

  // Parse "Depart X - Arrive Nantucket" lines from page text
  // Pattern: "H:MM a.m./p.m. - H:MM a.m./p.m. (LineName)"
  // We want the ARRIVE time (second time) for routes TO Nantucket
  const arrivals = [];

  // Split into sections by port
  const sections = html.split(/FROM\s+(?:HYANNIS|NEW BEDFORD|HARWICH|MARTHA)/gi);

  // Regex: grab lines with depart→arrive times
  // "Hyannis to Nantucket" sections — Depart Hyannis-Arrive Nantucket
  const lineRx = /(\d{1,2}:\d{2}\s*[ap]\.m\.)[\s\S]{1,6}?(\d{1,2}:\d{2}\s*[ap]\.m\.)\s*\(([^)]+)\)/gi;

  // Extract all "arrive Nantucket" times from raw page
  // The page lists: "Depart X - Arrive Nantucket" with the section header
  // We'll do a simpler targeted regex on the raw HTML text

  const clean = html.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/gi,' ');

  // Find "Hyannis to Nantucket" block, then grab times
  const hyToNan = clean.match(/Hyannis to Nantucket[\s\S]{0,4000}?(?=Nantucket to Hyannis)/i);
  const nbToNan = clean.match(/New Bedford to Nantucket[\s\S]{0,2000}?(?=Nantucket to New|FROM)/i);
  const hwToNan = clean.match(/Harwich[\s\S]{0,1000}?(?=Nantucket to Harwich|FROM)/i);
  const mvToNan = clean.match(/(?:Oak Bluffs|MVY) to Nantucket[\s\S]{0,2000}?(?=Nantucket to|FROM)/i);

  function extractArrivals(block, lineName, fromPort, ferryType) {
    if (!block) return;
    // Match "6:10 a.m. - 7:10 a.m. (Hy-Line)" → take second time
    const rx = /(\d{1,2}:\d{2}\s*[ap]\.m\.)\s*[-–]\s*(\d{1,2}:\d{2}\s*[ap]\.m\.)\s*\(([^)]+)\)/gi;
    let m;
    while ((m=rx.exec(block[0]))!==null) {
      const arriveStr = m[2].replace(/\./g,'').replace(/\s+/g,' ').trim();
      const lineParsed = m[3].trim();
      // convert "7:10 a m" → "7:10 AM"
      const t = arriveStr.replace(/a m$/i,'AM').replace(/p m$/i,'PM');
      arrivals.push({
        time: fmtTime(t),
        line: lineParsed,
        from: fromPort,
        type: ferryType,
        source:'live'
      });
    }
  }

  function fmtTime(raw) {
    // "7:10 AM" or "7:10 a m" → "7:10 AM"
    return raw.replace(/a\.?m\.?/i,'AM').replace(/p\.?m\.?/i,'PM').replace(/\s+/g,' ').trim();
  }

  // Parse each direction block
  if (hyToNan) extractArrivals(hyToNan, 'Hy-Line/Steamship', 'Hyannis', 'High-Speed');
  if (nbToNan) extractArrivals(nbToNan, 'Seastreak',         'New Bedford', 'High-Speed');
  if (hwToNan) extractArrivals(hwToNan, 'Freedom',           'Harwich Port', 'Fast Ferry');
  if (mvToNan) extractArrivals(mvToNan, 'Hy-Line',           'Oak Bluffs', 'Fast Ferry');

  return arrivals.length > 0 ? arrivals : null;
}

function renderFerryTab(forceSource) {
  const targetDate = ferryTargetDate(ferryDayOffset);
  document.getElementById('ferryDateLabel').innerText = ferryLabel(targetDate);

  const key = dateKey(targetDate);
  let arrivals = null;
  let source = 'builtin';

  if (ferryLiveCache[key] && !forceSource) {
    arrivals = ferryLiveCache[key]; source = 'live';
  } else if (forceSource === 'live' && ferryLiveCache[key]) {
    arrivals = ferryLiveCache[key]; source = 'live';
  } else {
    arrivals = builtinArrivals(targetDate); source = 'builtin';
  }

  // Badge
  const badge = document.getElementById('ferrySourceBadge');
  if (source==='live') {
    badge.style.background='#0a2a0a'; badge.style.color='#30d158';
    badge.innerText='🟢 Live данные';
  } else {
    badge.style.background='#1e1e28'; badge.style.color='#aaa';
    badge.innerText='📋 Встроенные';
  }

  if (!arrivals || arrivals.length===0) {
    document.getElementById('ferryArrivalsContainer').innerHTML =
      `<div style="text-align:center;padding:32px;opacity:.5;font-size:15px;">
         Нет данных для этой даты.<br>
         <a href="https://www.nantucketferries.com" target="_blank" style="color:#0A84FF;">nantucketferries.com</a>
       </div>`;
    document.getElementById('rushIndicatorCard').innerHTML =
      `<div style="opacity:.5;font-size:13px;">Статус</div>
       <div style="font-size:18px;font-weight:800;margin-top:4px;">📅 Нет расписания</div>`;
    return;
  }

  const now = new Date();
  const upcoming = arrivals.filter(a=>a.dateObj>now);
  const past     = arrivals.filter(a=>a.dateObj<=now);

  renderRushCard(upcoming, now);

  let html = '';

  if (upcoming.length===0 && past.length===0) {
    html = `<div style="text-align:center;padding:24px;opacity:.5;">Нет паромов</div>`;
  }

  if (upcoming.length > 0) {
    html += `<div style="font-size:11px;font-weight:700;opacity:.4;letter-spacing:1px;margin-bottom:8px;">СЛЕДУЮЩИЕ ПРИБЫТИЯ</div>`;
    upcoming.forEach((a,i)=>{
      const isNext = i===0;
      const minsLeft = Math.floor((a.dateObj-now)/60000);
      const hot = minsLeft<=20;
      html += `
      <div class="fa-row" data-iso="${a.dateObj.toISOString()}" style="
        background:${isNext?(hot?'#2a1200':'#0f1f14'):'#17181c'};
        border:1px solid ${isNext?(hot?'#ff9f0a':'#30d158'):'#252528'};
        border-radius:15px;padding:13px 15px;margin-bottom:9px;
        display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:11px;">
          <div style="font-size:24px;">${lineEmoji(a.line)}</div>
          <div>
            <div style="font-size:18px;font-weight:800;">${a.time}</div>
            <div style="font-size:13px;color:${lineColor(a.line)};font-weight:600;">${a.line}</div>
            <div style="font-size:11px;opacity:.5;">из ${a.from} · ${a.type}${a.note?` · ${a.note}`:''}</div>
          </div>
        </div>
        <div style="text-align:right;min-width:60px;">
          <div class="cd-val" style="font-size:15px;font-weight:800;color:${hot&&isNext?'#ff9f0a':'white'};">${fmtCD(a.dateObj-now)}</div>
          ${isNext?`<div style="font-size:10px;font-weight:800;color:${hot?'#ff9f0a':'#30d158'};margin-top:3px;">${hot?'⚡СКОРО':'▶ NEXT'}</div>`:''}
        </div>
      </div>`;
    });
  }

  if (past.length > 0) {
    html += `<div style="font-size:11px;font-weight:700;opacity:.3;letter-spacing:1px;margin:14px 0 8px;">УЖЕ ПРИБЫЛИ</div>`;
    past.slice().reverse().forEach(a=>{
      html += `
      <div style="background:#111;border:1px solid #1e1e1e;border-radius:13px;
        padding:10px 14px;margin-bottom:7px;opacity:.35;

          <div style="font-size:18px;">${lineEmoji(a.line)}</div>
          <div>
            <div style="font-size:15px;font-weight:700;text-decoration:line-through;">${a.time}</div>
            <div style="font-size:11px;color:${lineColor(a.line)};">${a.line} · из ${a.from}</div>
          </div>
        </div>
        <div style="font-size:12px;opacity:.6;">✓</div>
      </div>`;
    });
  }

  document.getElementById('ferryArrivalsContainer').innerHTML = html;
}

function renderRushCard(upcoming, now) {
  const card = document.getElementById('rushIndicatorCard');
  if (!upcoming||upcoming.length===0) {
    card.innerHTML=`<div style="opacity:.5;font-size:13px;">Статус</div><div style="font-size:20px;font-weight:800;margin-top:4px;">🌙 Паромов больше нет</div>`;
    return;
  }
  const next=upcoming[0], mins=Math.floor((next.dateObj-now)/60000);
  let icon,color,msg,sub;
  if (mins<=20)      { icon='🚨';color='#ff453a'; msg=`Паром через ${mins} мин!`;  sub=`${lineEmoji(next.line)} ${next.line} · ${next.time} из ${next.from}`; }
  else if (mins<=45) { icon='⚠️';color='#ffd60a'; msg=`Паром через ${Math.floor(mins/60)?Math.floor(mins/60)+'ч ':''}${mins%60}мин`; sub=`${lineEmoji(next.line)} ${next.line} · ${next.time}`; }
  else               { icon='🟢';color='#30d158'; const h=Math.floor(mins/60),m=mins%60; msg=`Спокойно · ${h?h+'ч ':''}${m}м`; sub=`${lineEmoji(next.line)} ${next.line} прибудет в ${next.time}`; }
  card.innerHTML=`
    <div style="opacity:.5;font-size:13px;">Статус</div>
    <div style="font-size:22px;font-weight:900;color:${color};margin-top:4px;">${icon} ${msg}</div>
    <div style="font-size:13px;opacity:.7;margin-top:5px;">${sub}</div>`;
}

// ── Countdown tick ─────────────────────────────────────────────
function startFerryTick() {
  stopFerryTick();
  ferryTickId = setInterval(()=>{
    const now = new Date();
    // Update countdown values in place
    document.querySelectorAll('.fa-row').forEach(row=>{
      const d=new Date(row.getAttribute('data-iso'));
      const cdEl=row.querySelector('.cd-val');
      if(cdEl) cdEl.innerText=fmtCD(d-now);
      if(d<=now) renderFerryTab(); // re-render when one expires
    });
    // Update rush card
    const targetDate=ferryTargetDate(ferryDayOffset);
    const key=dateKey(targetDate);
    const arr=ferryLiveCache[key]||builtinArrivals(targetDate)||[];
    renderRushCard(arr.filter(a=>a.dateObj>now), now);
  }, 30000);
}
function stopFerryTick() { if(ferryTickId) clearInterval(ferryTickId); ferryTickId=null; }

async function calculateFare() {

    const address = document.getElementById('destination').value.trim();

    if (!address) {
        alert('Enter destination');
        return;
    }

    lastDestinationAddress = address;

    const passengers =
        parseInt(document.getElementById('passengers').value);

    const extraPassengers =
        Math.max(0, passengers - 1);

    const passengerCharge =
        extraPassengers * 3;

    const dogs =
        parseInt(document.getElementById('dogs').value);

    const dogCharge = dogs * 5;

    const bikes =
        parseInt(document.getElementById('bikes').value);

    const bikeCharge = bikes * 5;

    const bags =
        parseInt(document.getElementById('bags').value);

    const bagCharge = bags * 2;

    const nightCharge =
        document.getElementById('nightFee').checked ? 5 : 0;

    const dirtCharge =
        document.getElementById('dirtRoad').checked ? 5 : 0;

    let destinationZone = null;
    let lat = null;
    let lng = null;

    // LOCAL DATABASE FIRST
    const localMatch = localPlaces.find(p =>
        p.name.toLowerCase() === address.toLowerCase() ||
        address.toLowerCase().includes(p.name.toLowerCase())
    );

    if (localMatch) {

        destinationZone = localMatch.zone;

    } else if (
        window.selectedPlace &&
        window.selectedPlace.geometry
    ) {

        lat =
            window.selectedPlace.geometry.location.lat();

        lng =
            window.selectedPlace.geometry.location.lng();

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);

    } else {

        const url =
            `https://photon.komoot.io/api/?q=${encodeURIComponent(address + " Nantucket")}&limit=5`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.features || !data.features.length) {
            alert('Place not found');
            return;
        }

        const best = data.features[0];

        lat = best.geometry.coordinates[1];
        lng = best.geometry.coordinates[0];

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);
    }

    if (destinationZone === 'Cross Town') {
        destinationZone = 'Town';
    }

    document.getElementById('destinationZone').innerText =
        destinationZone || 'Unknown';

    if (!currentZoneName || !destinationZone) {
        document.getElementById('fare').innerText = '$ ?';
        return;
    }

    let baseFare = getFare(currentZoneName, destinationZone);

    if (
        currentZoneName === 'Town' &&
        destinationZone === 'Town'
    ) {
        baseFare = 14;
    }

    if (!baseFare) {
        document.getElementById('fare').innerText =
            'No fare found';
        return;
    }

    const totalFare =
        baseFare +
        passengerCharge +
        dogCharge +
        bikeCharge +
        bagCharge +
        nightCharge +
        dirtCharge;

    document.getElementById('fare').innerText =
        `$${totalFare}`;

    document.getElementById('fareBreakdown').innerHTML =
`
<div class="fare-row"><span>Base Fare</span><span>$${baseFare}</span></div>
<div class="fare-row"><span>Passengers</span><span>$${passengerCharge}</span></div>
<div class="fare-row"><span>Dogs</span><span>$${dogCharge}</span></div>
<div class="fare-row"><span>Bikes</span><span>$${bikeCharge}</span></div>
<div class="fare-row"><span>Bags</span><span>$${bagCharge}</span></div>
<div class="fare-row"><span>Night Fee</span><span>$${nightCharge}</span></div>
<div class="fare-row"><span>Dirt Road</span><span>$${dirtCharge}</span></div>

<div class="total-row">
<span>Total</span>
<span>$${totalFare}</span>
</div>
`;

    if (lat && lng) {

        if(window.destinationMarker){
            map.removeLayer(window.destinationMarker);
        }

        window.destinationMarker =
            L.marker([lat, lng]).addTo(map);

        map.setView([lat, lng], 14);
    }
}

</script>



<script>
let autocomplete;

function initAutocomplete() {

    const input = document.getElementById('destination');

    const nantucketBounds = new google.maps.LatLngBounds(
        new google.maps.LatLng(41.230, -70.240),
        new google.maps.LatLng(41.340, -69.950)
    );

    autocomplete = new google.maps.places.Autocomplete(input, {
        types: ['geocode','establishment'],
        componentRestrictions: { country:'us' },
        bounds: nantucketBounds,
        strictBounds: false,
        fields:['geometry','name','formatted_address']
    });

    autocomplete.setBounds(nantucketBounds);

        input.addEventListener('input', ()=>{

        if(input.value.trim().length < 3){
            window.selectedPlace = null;
        }
    });

    autocomplete.addListener('place_changed', () => {

        const place = autocomplete.getPlace();

        if (!place || !place.geometry) return;

        window.selectedPlace = place;
    });

    // Hide non Nantucket suggestions visually
    const observer = new MutationObserver(() => {

        document.querySelectorAll('.pac-item').forEach(item => {

            const txt = item.innerText.toLowerCase();

            const allItems =
                Array.from(document.querySelectorAll('.pac-item'));

            const hasNantucket =
                allItems.some(el =>
                    el.innerText.toLowerCase().includes('nantucket')
                );

            // Only filter when Nantucket results exist
            if (hasNantucket) {

                if (!txt.includes('nantucket')) {
                    item.style.display = 'none';
                } else {
                    item.style.display = 'block';

                    // Clean text
                    item.innerHTML =
                        item.innerHTML
                            .replace(/,\s*Nantucket,\s*MA,\s*USA/gi,'')
                            .replace(/Nantucket,\s*MA,\s*USA/gi,'');
                }

            } else {

                // Show all until Nantucket appears
                item.style.display = 'block';
            }
        });
    });

    observer.observe(document.body,{
        childList:true,
        subtree:true
    });
}
</script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyChh4QTDtpcj9u_QwchPjZ5jE9B1VIl1wM&libraries=places&callback=initAutocomplete">
</script>
