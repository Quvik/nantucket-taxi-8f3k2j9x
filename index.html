<script>

const fareTable = {

    // AIRPORT
    "Airport-Cisco/ Miacomet": 32,
    "Airport-Dionis": 35,
    "Airport-Eel Point": 40,
    "Airport-Hoicks Hollow": 36,
    "Airport-Low Beach": 32,
    "Airport-Madaket": 47,
    "Airport-Madequecham Valley": 32,
    "Airport-Massassoit Bridge": 49,
    "Airport-Mid Island A": 21,
    "Airport-Mid - Island B": 21,
    "Airport-Mid Island C": 26,
    "Airport-Pocomo": 37,
    "Airport-Polpis": 32,
    "Airport-Quaise": 27,
    "Airport-Quidnet": 37,
    "Airport-Sankaty Light": 35,
    "Airport-Shimo": 23,
    "Airport-Siasconset": 31,
    "Airport-Tom Nevers": 27,
    "Airport-Town": 23,
    "Airport-Wauwinet": 42,
    "Airport-Cross Town": 27,
    "Airport-Squam": 44,

    // TOWN
    "Town-Cisco/ Miacomet": 25,
    "Town-Dionis": 24,
    "Town-Eel Point": 30,
    "Town-Hoicks Hollow": 40,
    "Town-Low Beach": 36,
    "Town-Madaket": 31,
    "Town-Madequecham Valley": 37,
    "Town-Massassoit Bridge": 39,
    "Town-Mid Island A": 17,
    "Town-Mid - Island B": 20,
    "Town-Mid Island C": 22,
    "Town-Pocomo": 37,
    "Town-Polpis": 32,
    "Town-Quaise": 27,
    "Town-Quidnet": 37,
    "Town-Sankaty Light": 39,
    "Town-Shimo": 23,
    "Town-Siasconset": 35,
    "Town-Tom Nevers": 30,
    "Town-Airport": 23,
    "Town-Wauwinet": 42,
    "Town-Squam": 44,

    // CROSS ISLAND
    "Wauwinet-Siasconset": 50,
    "Madaket-Siasconset": 65,
    "Wauwinet-Madaket": 70
};

let currentZoneName = null;
let zonesGeoJSON = null;

const map = L.map('map').setView([41.2835, -70.0995], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

fetch('zones.kml')
.then(res => res.text())
.then(kmlText => {

    const parser = new DOMParser();
    const kml = parser.parseFromString(kmlText, 'text/xml');

    zonesGeoJSON = toGeoJSON.kml(kml);

    const layer = L.geoJSON(zonesGeoJSON, {
        style: {
            color: '#00bfff',
            weight: 2,
            fillOpacity: 0.2
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

    detectCurrentLocation();
});

function detectCurrentLocation() {

    navigator.geolocation.getCurrentPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        const point = turf.point([lng, lat]);

        L.marker([lat, lng]).addTo(map);

        currentZoneName = findZone(point);

        // Safety fallback
        if (currentZoneName === 'Cross Town') {
            currentZoneName = 'Town';
        }

        document.getElementById('currentZone').innerText =
            currentZoneName || 'Unknown';

    }, err => {
        alert('Allow location access');
    });
}

function findZone(point) {

    let fallbackZone = null;

    for (const feature of zonesGeoJSON.features) {

        try {

            if (turf.booleanPointInPolygon(point, feature)) {

                const zoneName =
                    feature.properties.name || "Unknown";

                // Ignore Cross Town overlay zone
                if (zoneName === 'Cross Town') {
                    fallbackZone = 'Town';
                    continue;
                }

                return zoneName;
            }

        } catch(e) {}
    }

    return fallbackZone;
}

function getFare(fromZone, toZone) {

    const direct = `${fromZone}-${toZone}`;
    const reverse = `${toZone}-${fromZone}`;

    return fareTable[direct] || fareTable[reverse] || null;
}


let lastDestinationAddress = "";

let localPlaces = [];

fetch('places.json')
.then(r => r.json())
.then(data => {
    localPlaces = data;
})
.catch(() => {});





function showTab(tabId, btn){

document.getElementById('taxiTab').style.display='none';
document.getElementById('ferryTab').style.display='none';

document.getElementById(tabId).style.display='block';

document.querySelectorAll('.tab-btn').forEach(b=>{
b.classList.remove('active-tab');
});

btn.classList.add('active-tab');
}


const steamshipArrivals = [
'8:15 AM',
'10:15 AM',
'12:45 PM',
'3:15 PM',
'5:45 PM',
'8:15 PM',
'10:45 PM'
];

const hylineArrivals = [
'9:00 AM',
'11:15 AM',
'2:15 PM',
'5:10 PM',
'7:40 PM',
'10:00 PM'
];

function parseTime(str){

const now = new Date();

const [time,modifier] = str.split(' ');

let [hours,minutes] = time.split(':').map(Number);

if(modifier === 'PM' && hours !== 12) hours += 12;
if(modifier === 'AM' && hours === 12) hours = 0;

const d = new Date(now);

d.setHours(hours);
d.setMinutes(minutes);
d.setSeconds(0);

return d;
}

function formatCountdown(target){

const now = new Date();

const diff = target - now;

if(diff <= 0) return 'Arriving';

const mins = Math.floor(diff / 60000);

const h = Math.floor(mins / 60);
const m = mins % 60;

if(h > 0){
return `${h}h ${m}m`;
}

return `${m} min`;
}

function getNextArrival(list){

const now = new Date();

for(const t of list){

const parsed = parseTime(t);

if(parsed > now){
return {
time:t,
date:parsed
};
}
}

return null;
}

async function loadSteamshipArrival(){

const container =
document.getElementById('steamshipArrivalCard');

const next =
getNextArrival(steamshipArrivals);

let status = 'On Time';

try{

const proxy =
'https://api.allorigins.win/raw?url=';

const target =
encodeURIComponent(
'https://www.steamshipauthority.com/traveling_today/status'
);

const response =
await fetch(proxy + target);

const text =
await response.text();

if(text.toLowerCase().includes('delayed')){
status = 'Delayed';
}

if(text.toLowerCase().includes('boarding')){
status = 'Boarding';
}

if(text.toLowerCase().includes('cancelled')){
status = 'Cancelled';
}

}catch(e){}

container.innerHTML = `
<div style="font-size:26px;font-weight:800;margin-bottom:10px;">
🚢 Steamship
</div>

<div class="ferry-row">
<span>Arrives Nantucket</span>
<span>${next.time}</span>
</div>

<div class="ferry-row">
<span>Status</span>
<span>${status}</span>
</div>

<div class="ferry-row">
<span>Countdown</span>
<span>${formatCountdown(next.date)}</span>
</div>
`;
}

function loadHylineArrival(){

const container =
document.getElementById('hylineArrivalCard');

const next =
getNextArrival(hylineArrivals);

container.innerHTML = `
<div style="font-size:26px;font-weight:800;margin-bottom:10px;">
🚤 Hy-Line
</div>

<div class="ferry-row">
<span>Arrives Nantucket</span>
<span>${next.time}</span>
</div>

<div class="ferry-row">
<span>Status</span>
<span>On Time</span>
</div>

<div class="ferry-row">
<span>Countdown</span>
<span>${formatCountdown(next.date)}</span>
</div>
`;
}

window.addEventListener('load',()=>{

loadSteamshipArrival();
loadHylineArrival();

setInterval(loadSteamshipArrival,300000);
setInterval(loadHylineArrival,60000);

});


function changeValue(id, delta){

const input = document.getElementById(id);
const display = document.getElementById(id + 'Value');

let current = parseInt(input.value || 0);

const limits = {
passengers:[1,6],
dogs:[0,3],
bikes:[0,3],
bags:[0,4]
};

const min = limits[id][0];
const max = limits[id][1];

current += delta;

if(current < min) current = min;
if(current > max) current = max;

input.value = current;

if(id === 'passengers'){
display.innerText = current;
}else{
display.innerText = current;
}
}


function setDestination(placeName) {
    document.getElementById('destination').value = placeName;
    lastDestinationAddress = placeName;
}

function openGoogleMaps() {


    if (!lastDestinationAddress) {
        alert("Calculate fare first");
        return;
    }

    const url =
        `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lastDestinationAddress)}`;

    window.open(url, '_blank');
}

function openWaze() {

    if (!lastDestinationAddress) {
        alert("Calculate fare first");
        return;
    }

    const url =
        `https://waze.com/ul?q=${encodeURIComponent(lastDestinationAddress)}&navigate=yes`;

    window.open(url, '_blank');
}



// AUTOCOMPLETE
window.addEventListener('load', () => {

    const destinationInput = document.getElementById('destination');
    const suggestionList = document.getElementById('suggestions');

    if (!destinationInput || !suggestionList) return;

    destinationInput.addEventListener('input', async function() {

        window.selectedPlace = null;

        const query = destinationInput.value;

        if (query.length < 2) return;

        try {

            const url =
                `https://photon.komoot.io/api/?q=${encodeURIComponent(query + " Nantucket")}&limit=5`;

            const response = await fetch(url);
            const data = await response.json();

            suggestionList.innerHTML = "";

            if (data.features) {

                data.features.forEach(feature => {

                    const option = document.createElement('option');

                    let label =
                        feature.properties.name || "";

                    if (
                        feature.properties.street &&
                        !label.includes(feature.properties.street)
                    ) {
                        label += " - " + feature.properties.street;
                    }

                    option.value = label;

                    suggestionList.appendChild(option);
                });
            }

        } catch(e) {
            console.log(e);
        }

    });

});


async function calculateFare() {

    const address = document.getElementById('destination').value.trim();

    if (!address) {
        alert('Enter destination');
        return;
    }

    lastDestinationAddress = address;

    const passengers =
        parseInt(document.getElementById('passengers').value);

    const extraPassengers =
        Math.max(0, passengers - 1);

    const passengerCharge =
        extraPassengers * 3;

    const dogs =
        parseInt(document.getElementById('dogs').value);

    const dogCharge = dogs * 5;

    const bikes =
        parseInt(document.getElementById('bikes').value);

    const bikeCharge = bikes * 5;

    const bags =
        parseInt(document.getElementById('bags').value);

    const bagCharge = bags * 2;

    const nightCharge =
        document.getElementById('nightFee').checked ? 5 : 0;

    const dirtCharge =
        document.getElementById('dirtRoad').checked ? 5 : 0;

    let destinationZone = null;
    let lat = null;
    let lng = null;

    // LOCAL DATABASE FIRST
    const localMatch = localPlaces.find(p =>
        p.name.toLowerCase() === address.toLowerCase() ||
        address.toLowerCase().includes(p.name.toLowerCase())
    );

    if (localMatch) {

        destinationZone = localMatch.zone;

    } else if (
        window.selectedPlace &&
        window.selectedPlace.geometry
    ) {

        lat =
            window.selectedPlace.geometry.location.lat();

        lng =
            window.selectedPlace.geometry.location.lng();

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);

    } else {

        const url =
            `https://photon.komoot.io/api/?q=${encodeURIComponent(address + " Nantucket")}&limit=5`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.features || !data.features.length) {
            alert('Place not found');
            return;
        }

        const best = data.features[0];

        lat = best.geometry.coordinates[1];
        lng = best.geometry.coordinates[0];

        const point = turf.point([lng, lat]);

        destinationZone = findZone(point);
    }

    if (destinationZone === 'Cross Town') {
        destinationZone = 'Town';
    }

    document.getElementById('destinationZone').innerText =
        destinationZone || 'Unknown';

    if (!currentZoneName || !destinationZone) {
        document.getElementById('fare').innerText = '$ ?';
        return;
    }

    let baseFare = getFare(currentZoneName, destinationZone);

    if (
        currentZoneName === 'Town' &&
        destinationZone === 'Town'
    ) {
        baseFare = 14;
    }

    if (!baseFare) {
        document.getElementById('fare').innerText =
            'No fare found';
        return;
    }

    const totalFare =
        baseFare +
        passengerCharge +
        dogCharge +
        bikeCharge +
        bagCharge +
        nightCharge +
        dirtCharge;

    document.getElementById('fare').innerText =
        `$${totalFare}`;

    document.getElementById('fareBreakdown').innerHTML =
`
<div class="fare-row"><span>Base Fare</span><span>$${baseFare}</span></div>

<script>
let autocomplete;

function initAutocomplete() {

    const input = document.getElementById('destination');

    const nantucketBounds = new google.maps.LatLngBounds(
        new google.maps.LatLng(41.230, -70.240),
        new google.maps.LatLng(41.340, -69.950)
    );

    autocomplete = new google.maps.places.Autocomplete(input, {
        types: ['geocode','establishment'],
        componentRestrictions: { country:'us' },
        bounds: nantucketBounds,
        strictBounds: false,
        fields:['geometry','name','formatted_address']
    });

    autocomplete.setBounds(nantucketBounds);

    autocomplete.addListener('place_changed', () => {

        const place = autocomplete.getPlace();

        if (!place || !place.geometry) return;

        window.selectedPlace = place;
    });

    // Hide non Nantucket suggestions visually
    const observer = new MutationObserver(() => {

        document.querySelectorAll('.pac-item').forEach(item => {

            const txt = item.innerText.toLowerCase();

            const allItems =
                Array.from(document.querySelectorAll('.pac-item'));

            const hasNantucket =
                allItems.some(el =>
                    el.innerText.toLowerCase().includes('nantucket')
                );

            // Only filter when Nantucket results exist
            if (hasNantucket) {

                if (!txt.includes('nantucket')) {
                    item.style.display = 'none';
                } else {
                    item.style.display = 'block';

                    // Clean text
                    item.innerHTML =
                        item.innerHTML
                            .replace(/,\s*Nantucket,\s*MA,\s*USA/gi,'')
                            .replace(/Nantucket,\s*MA,\s*USA/gi,'');
                }

            } else {

                // Show all until Nantucket appears
                item.style.display = 'block';
            }
        });
    });

    observer.observe(document.body,{
        childList:true,
        subtree:true
    });
}
</script>


<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyChh4QTDtpcj9u_QwchPjZ5jE9B1VIl1wM&libraries=places&callback=initAutocomplete">
</script>
